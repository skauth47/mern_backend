<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A structured browser view for the MERN Users API collection."
    />
    <title>Users Collection | MERN Users API</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(15, 31, 50, 0.82);
        --panel-strong: rgba(19, 42, 67, 0.96);
        --line: rgba(148, 163, 184, 0.18);
        --muted: #9fb0c7;
        --text: #edf7ff;
        --cyan: #5ee9d2;
        --blue: #76b7ff;
        --red: #ff8590;
        --shadow: 0 20px 70px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 12% 8%, rgba(37, 99, 235, 0.24), transparent 28rem),
          radial-gradient(circle at 88% 20%, rgba(20, 184, 166, 0.2), transparent 25rem),
          var(--bg);
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        opacity: 0.3;
        background-image: linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: linear-gradient(to bottom, black, transparent 90%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding-bottom: 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 0;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 11px;
        font-weight: 750;
        letter-spacing: -0.03em;
      }

      .logo {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid rgba(94, 233, 210, 0.48);
        border-radius: 11px;
        color: var(--cyan);
        background: rgba(94, 233, 210, 0.11);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }

      .back {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        transition: color 160ms ease;
      }

      .back:hover {
        color: var(--cyan);
      }

      .hero {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 30px;
        padding: 64px 0 30px;
      }

      .eyebrow {
        color: var(--cyan);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 12px;
        font-size: clamp(44px, 8vw, 76px);
        letter-spacing: -0.08em;
        line-height: 0.96;
      }

      .intro {
        max-width: 650px;
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .count {
        min-width: 132px;
        padding: 17px 20px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .count strong,
      .count span {
        display: block;
      }

      .count strong {
        color: var(--cyan);
        font-size: 30px;
        letter-spacing: -0.06em;
      }

      .count span {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 26px 0 14px;
      }

      .search {
        width: min(100%, 420px);
        padding: 13px 15px;
        border: 1px solid var(--line);
        border-radius: 10px;
        outline: none;
        color: var(--text);
        background: rgba(10, 24, 40, 0.86);
        font: inherit;
      }

      .search:focus {
        border-color: rgba(94, 233, 210, 0.6);
        box-shadow: 0 0 0 3px rgba(94, 233, 210, 0.1);
      }

      .json-link {
        color: var(--blue);
        font-size: 13px;
        font-weight: 750;
      }

      .table-wrap {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      th {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      tbody tr {
        transition: background 160ms ease;
      }

      tbody tr:hover {
        background: rgba(118, 183, 255, 0.06);
      }

      .name {
        color: var(--text);
        font-weight: 750;
      }

      .id {
        color: var(--blue);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .state {
        padding: 32px 20px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: var(--red);
      }

      @media (max-width: 720px) {
        .hero {
          display: block;
          padding-top: 42px;
        }

        .count {
          display: inline-block;
          margin-top: 22px;
        }

        .toolbar {
          display: block;
        }

        .search {
          width: 100%;
        }

        .json-link {
          display: inline-block;
          margin-top: 12px;
        }

        th:nth-child(3),
        td:nth-child(3),
        th:nth-child(4),
        td:nth-child(4) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <a class="brand" href="/">
          <span class="logo">{ }</span>
          <span>MERN Users API</span>
        </a>
        <a class="back" href="/">&lt;- API overview</a>
      </header>

      <main>
        <div class="hero">
          <div>
            <span class="eyebrow">Live collection</span>
            <h1>Users</h1>
            <p class="intro">
              A structured browser view of the users collection. Sensitive
              fields are excluded from this response.
            </p>
          </div>
          <div class="count">
            <strong id="user-count">--</strong>
            <span>Total users</span>
          </div>
        </div>

        <div class="toolbar">
          <input
            class="search"
            id="search"
            type="search"
            placeholder="Search by name or email"
            aria-label="Search users"
          />
          <a class="json-link" href="/api/users?format=json">View raw JSON -&gt;</a>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>User ID</th>
                <th>Updated</th>
              </tr>
            </thead>
            <tbody id="user-rows">
              <tr>
                <td class="state" colspan="4">Loading users...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <script>
      const rows = document.querySelector("#user-rows");
      const count = document.querySelector("#user-count");
      const search = document.querySelector("#search");
      let users = [];

      const escapeHtml = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const formatDate = (value) => {
        if (!value) return "Not recorded";
        return new Intl.DateTimeFormat("en", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));
      };

      const render = () => {
        const term = search.value.trim().toLowerCase();
        const filtered = users.filter((user) =>
          `${user.name ?? ""} ${user.email ?? ""}`.toLowerCase().includes(term)
        );

        count.textContent = users.length;

        if (!filtered.length) {
          rows.innerHTML =
            '<tr><td class="state" colspan="4">No users match this search.</td></tr>';
          return;
        }

        rows.innerHTML = filtered
          .map(
            (user) => `
              <tr>
                <td class="name">${escapeHtml(user.name || "Unnamed user")}</td>
                <td class="muted">${escapeHtml(user.email || "Not provided")}</td>
                <td class="id">${escapeHtml(user._id)}</td>
                <td class="muted">${escapeHtml(formatDate(user.updatedAt))}</td>
              </tr>
            `
          )
          .join("");
      };

      const loadUsers = async () => {
        try {
          const response = await fetch("/api/users?format=json", {
            headers: { Accept: "application/json" },
          });

          if (!response.ok) throw new Error("Request failed");

          users = await response.json();
          render();
        } catch {
          count.textContent = "0";
          rows.innerHTML =
            '<tr><td class="state error" colspan="4">Unable to load users. Please refresh the page.</td></tr>';
        }
      };

      search.addEventListener("input", render);
      loadUsers();
    </script>
  </body>
</html>
